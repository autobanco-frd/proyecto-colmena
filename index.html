<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <title>Proyecto Colmena AR</title>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui-overlay { position: fixed; top: 10px; left: 10px; z-index: 999; }
      button { padding: 10px; background: #8e44ad; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <button id="startButton">INICIAR COLMENA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="beeVideo" src="./bee.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#beeVideo" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector("#startButton");
      const sceneEl = document.querySelector("a-scene");
      
      startButton.addEventListener('click', () => {
        const { entity } = sceneEl.systems["mindar-image-system"];
        sceneEl.systems["mindar-image-system"].start(); // Inicia la cámara
        document.querySelector("#beeVideo").play();    // Inicia el video
        startButton.style.display = "none";             // Oculta el botón
      });
    </script>
  </body>
</html>
