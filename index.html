<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <title>Colmena AR</title>
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; }
      #start-btn { padding: 20px 40px; font-size: 20px; background: #8e44ad; color: white; border: none; border-radius: 50px; cursor: pointer; font-family: sans-serif; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="start-btn">INICIAR ESCANEO</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="bee-vid" src="./bee.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#bee-vid" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const overlay = document.querySelector("#overlay");
      const sceneEl = document.querySelector("a-scene");

      startBtn.addEventListener('click', () => {
        overlay.style.display = "none";
        // Comando crítico para activar cámara y video simultáneamente
        sceneEl.systems["mindar-image-system"].start();
        document.querySelector("#bee-vid").play();
      });
    </script>
  </body>
</html>
