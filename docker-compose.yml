version: '3.8'

services:
  proyecto-colmena:
    build: .
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.colmena.rule=Host(`localhost`)"
      - "traefik.http.services.colmena.loadbalancer.server.port=80"
